name: JO MAP API Tests

on:
  push:
    branches:
      - jomap-back-version
  pull_request:
    branches:
      - jomap-back-version

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: jomap_test
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: jomap
          MYSQL_PASSWORD: jomap123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Newman dependencies
        run: npm install

      - name: Build Spring Boot project
        run: mvn clean package -DskipTests

      - name: Run Spring Boot app
        run: |
          nohup java -jar target/*.jar \
            --server.port=8085 \
            --spring.datasource.url=jdbc:mysql://localhost:3306/jomap_test \
            --spring.datasource.username=jomap \
            --spring.datasource.password=jomap123 \
            --spring.jpa.hibernate.ddl-auto=update \
            > app.log 2>&1 &

      - name: Wait for backend to start
        run: |
          echo "Waiting for backend..."
          sleep 30
          curl -f http://localhost:8085/actuator/health || cat app.log

      - name: Run Postman API tests with Newman
        run: npm run test:api

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-api-test-results
          path: postman/results/
